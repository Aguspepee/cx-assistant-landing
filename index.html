  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Cx Assistant",
      "url": "https://cx-assistant.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://cx-assistant.com/logo.png"
      }
    }
    </script>

  <!-- Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Cx Assistant",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://cx-assistant.com",
      "description": "AI-powered commissioning platform for engineering teams managing issues, assets, and complex documentation.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Basic",
          "price": "150",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "150",
            "priceCurrency": "USD",
            "unitText": "MON"
          }
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "500",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "500",
            "priceCurrency": "USD",
            "unitText": "MON"
          }
        },
        {
          "@type": "Offer",
          "name": "Enterprise",
          "description": "Tailored commissioning platform — contact us for pricing"
        }
      ]
    }
    </script>

  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Cx Assistant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cx Assistant is a next-generation commissioning platform for complex environments. It combines a powerful management app with an AI assistant to automate tasks, enhance collaboration, and ensure flawless project delivery."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI assistant help engineers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The AI assistant automates repetitive tasks, links issues to assets, and provides instant answers to natural language questions. It helps engineers spend less time on admin and more time on actual engineering."
          }
        },
        {
          "@type": "Question",
          "name": "What types of projects is Cx Assistant built for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cx Assistant is designed for data centers, industrial facilities, and critical infrastructure—anywhere commissioning is complex, high-stakes, and time-critical."
          }
        },
        {
          "@type": "Question",
          "name": "How does Cx Assistant support compliance and quality?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cx Assistant highlights missing signatures, incomplete fields, and mismatched IDs, ensuring compliance before handover. AI-powered validation catches errors before they become risks."
          }
        }
      ]
    }
    </script>
  <!-- PRERENDER:META_END -->
